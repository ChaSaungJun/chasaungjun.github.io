<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차승준의 깃허브 블로그 — Cha Seungjun's GitHub Blog</title>
  <meta name="description" content="어서오세요, 차승준의 깃허브 블로그입니다. World Signal 등 하위 사이트로 이동할 수 있는 대문 페이지입니다.">
  <style>
    :root {
      --contrast: #222222;
      --contrast-2: #575760;
      --base-2: #f7f8f9;
      --base-3: #ffffff;
      --accent: #1e73be;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--base-2);
      color: var(--contrast);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      line-height: 1.7;
      word-break: keep-all;
      padding: 20px;
    }

    /* 환영 문구(가운데) + 하위 사이트 목록(우측) 배치 */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      max-width: 1100px;
      width: 100%;
    }

    .welcome { text-align: center; flex: 1; }
    .welcome-ko {
      margin: 0 0 14px;
      font-size: 40px;
      line-height: 1.4;
      font-weight: 700;
    }
    .welcome-en {
      margin: 0;
      font-size: 20px;
      color: var(--contrast-2);
      font-weight: 500;
    }

    /* 하위 사이트 목록 카드 */
    .subsites {
      background-color: var(--base-3);
      padding: 35px 40px;
      min-width: 320px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }
    .subsites h2 {
      margin: 0 0 18px;
      font-size: 20px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 12px;
    }
    .subsites ul { list-style: none; margin: 0; padding: 0; }
    .subsites li { padding: 10px 0; }
    .subsites a {
      color: var(--accent);
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
    }
    .subsites a:hover { color: var(--contrast); text-decoration: underline; text-underline-offset: 3px; }
    .subsite-desc {
      display: block;
      font-size: 14px;
      color: var(--contrast-2);
      margin-top: 2px;
    }

    /* 모바일: 위아래로 쌓기 */
    @media (max-width: 820px) {
      .hero { flex-direction: column; gap: 40px; }
      .welcome-ko { font-size: 28px; }
      .welcome-en { font-size: 16px; }
      .subsites { min-width: 0; width: 100%; max-width: 420px; }
    }
  </style>
</head>
<body>

  <main class="hero">

    <!-- 환영 문구 (한글/영어) -->
    <section class="welcome">
      <h1 class="welcome-ko">어서오세요,<br>차승준의 깃허브 블로그입니다.</h1>
      <p class="welcome-en">Welcome to Cha Seungjun's GitHub Blog.</p>
    </section>

    <!-- 하위 사이트 목록: 새 하위 사이트가 생기면 아래 li 하나를 복사해 추가하세요 -->
    <nav class="subsites" aria-label="하위 사이트 목록">
      <h2>하위 사이트</h2>
      <ul>
        <li>
          <a href="https://chasaungjun.github.io/worldsignal/">World Signal</a>
          <span class="subsite-desc">국내외 최신 정보</span>
        </li>
      </ul>
    </nav>

  </main>

</body>
</html>
